name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub Release
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Prepare release tag
        id: tag
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH, for example v0.1.0 or v0.2.0-beta.1."
            exit 1
          fi

          git fetch --tags --force origin

          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"

            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              git checkout --detach "$tag"
            fi
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build DecompKitDemo
        run: |
          xcodebuild \
            -project Examples/DecompKitDemo/DecompKitDemo.xcodeproj \
            -scheme DecompKitDemo \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create release tag
        if: github.event_name == 'workflow_dispatch' && steps.tag.outputs.tag_exists == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "${{ steps.tag.outputs.tag }}"
          git push origin "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.tag.outputs.tag }} already exists."
            exit 0
          fi

          args=(
            release create "${{ steps.tag.outputs.tag }}"
            --title "${{ steps.tag.outputs.tag }}"
            --generate-notes
            --verify-tag
          )

          if [[ "${{ steps.tag.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
